name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version Name (e.g., 1.5)'
        required: true
        default: '1.5'
      versionCode:
        description: 'Version Code (e.g., 5)'
        required: true
        default: '5'
      branch:
        description: 'Branch to build (e.g., main)'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}

      - name: Set up JDK
        uses: actions/setup-java@v4.2.2
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle/libs.versions.toml', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Read version from build.gradle.kts
        id: get_version
        run: |
          VERSION_NAME=$(grep 'versionName = ' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode = ' app/build.gradle.kts | sed 's/.*versionCode = \(.*\)/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Inject versionName and versionCode
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ github.event.inputs.versionName }}\"/" app/build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = ${{ github.event.inputs.versionCode }}/" app/build.gradle.kts

      - name: Decode and setup keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p keystore_details
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore_details/sensor.jks
          fi

      - name: Build APK (assembleRelease)
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/keystore_details/sensor.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK file
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.versionName || steps.get_version.outputs.version_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SensorApp-v${VERSION}-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: SensorApp-APK-${{ github.run_number }}
          path: app/build/outputs/apk/release/SensorApp-v*-release.apk
