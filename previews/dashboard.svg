<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" width="360" height="720">
  <rect width="360" height="720" fill="#f0f0f0" rx="20"/>
  <!-- Status bar -->
  <rect width="360" height="40" fill="#f0f0f0"/>
  <text x="180" y="28" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#333" font-weight="bold">SensorApp</text>
  <text x="330" y="28" font-family="sans-serif" font-size="16" fill="#555">⚙</text>
  
  <!-- Sensor cards grid -->
  <!-- Row 1 -->
  <!-- Accelerometer (available) -->
  <rect x="12" y="50" width="168" height="120" rx="12" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="78" font-family="sans-serif" font-size="10" fill="#666">📱 Accelerometer</text>
  <circle cx="24" cy="102" r="5" fill="#4CAF50" opacity="0.7"/>
  <circle cx="24" cy="102" r="5" fill="#4CAF50" opacity="0.3"/>
  <text x="36" y="106" font-family="sans-serif" font-size="22" fill="#333" font-weight="bold">9.812</text>
  <text x="24" y="130" font-family="sans-serif" font-size="10" fill="#888">X: 9.812 Y: 0.012 Z: 0.034</text>
  <text x="24" y="146" font-family="sans-serif" font-size="9" fill="#999">m/s²</text>
  <rect x="120" y="66" width="52" height="16" rx="8" fill="#E8F5E9"/><text x="146" y="78" font-family="sans-serif" font-size="8" fill="#4CAF50" text-anchor="middle" font-weight="bold">LIVE</text>
  
  <!-- Gyroscope (available) -->
  <rect x="192" y="50" width="156" height="120" rx="12" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="204" y="78" font-family="sans-serif" font-size="10" fill="#666">🌀 Gyroscope</text>
  <text x="204" y="106" font-family="sans-serif" font-size="22" fill="#333" font-weight="bold">0.012</text>
  <text x="204" y="130" font-family="sans-serif" font-size="10" fill="#888">X: 0.012 Y: 0.003 Z: 0.001</text>
  <text x="204" y="146" font-family="sans-serif" font-size="9" fill="#999">°/s</text>
  
  <!-- Magnetometer (available) -->
  <rect x="12" y="180" width="168" height="120" rx="12" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="208" font-family="sans-serif" font-size="10" fill="#666">🧲 Magnetometer</text>
  <text x="24" y="236" font-family="sans-serif" font-size="22" fill="#333" font-weight="bold">45.23</text>
  <text x="24" y="260" font-family="sans-serif" font-size="10" fill="#888">X: 45.23 Y: 12.45 Z: 8.12</text>
  <text x="24" y="276" font-family="sans-serif" font-size="9" fill="#999">µT</text>
  
  <!-- Light (available) -->
  <rect x="192" y="180" width="156" height="120" rx="12" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="204" y="208" font-family="sans-serif" font-size="10" fill="#666">☀ Light</text>
  <text x="204" y="236" font-family="sans-serif" font-size="22" fill="#333" font-weight="bold">342.0</text>
  <text x="204" y="260" font-family="sans-serif" font-size="10" fill="#888">lux</text>
  
  <!-- Proximity (unavailable) -->
  <rect x="12" y="310" width="168" height="120" rx="12" fill="#f5f5f5" stroke="#eee" stroke-width="1" opacity="0.5"/>
  <text x="24" y="338" font-family="sans-serif" font-size="10" fill="#bbb">📏 Proximity</text>
  <rect x="24" y="348" width="80" height="16" rx="4" fill="#FFCDD2"/>
  <text x="64" y="360" font-family="sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle" font-weight="bold">Not available</text>
  
  <!-- Barometer (unavailable) -->
  <rect x="192" y="310" width="156" height="120" rx="12" fill="#f5f5f5" stroke="#eee" stroke-width="1" opacity="0.5"/>
  <text x="204" y="338" font-family="sans-serif" font-size="10" fill="#bbb">🌡 Barometer</text>
  <rect x="204" y="348" width="80" height="16" rx="4" fill="#FFCDD2"/>
  <text x="244" y="360" font-family="sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle" font-weight="bold">Not available</text>
  
  <!-- Step Counter (available) -->
  <rect x="12" y="440" width="168" height="120" rx="12" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="24" y="468" font-family="sans-serif" font-size="10" fill="#666">👣 Step Counter</text>
  <text x="24" y="496" font-family="sans-serif" font-size="22" fill="#333" font-weight="bold">1,284</text>
  <text x="24" y="520" font-family="sans-serif" font-size="10" fill="#888">steps</text>
  
  <!-- Gravity (available) -->
  <rect x="192" y="440" width="156" height="120" rx="12" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="204" y="468" font-family="sans-serif" font-size="10" fill="#666">🌍 Gravity</text>
  <text x="204" y="496" font-family="sans-serif" font-size="22" fill="#333" font-weight="bold">9.801</text>
  <text x="204" y="520" font-family="sans-serif" font-size="10" fill="#888">m/s²</text>
  
  <!-- FAB -->
  <circle cx="324" cy="680" r="28" fill="#006494"/>
  <text x="324" y="686" font-family="sans-serif" font-size="18" fill="white" text-anchor="middle">▶</text>
</svg>
