<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" width="360" height="720">
  <rect width="360" height="720" fill="#f0f0f0" rx="20"/>
  <!-- Top bar -->
  <rect width="360" height="48" fill="#f0f0f0"/>
  <text x="20" y="32" font-family="sans-serif" font-size="18" fill="#333">←</text>
  <text x="180" y="32" font-family="sans-serif" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">Accelerometer</text>
  
  <!-- LIVE indicator -->
  <rect x="146" y="56" width="68" height="22" rx="12" fill="#E8F5E9"/>
  <circle cx="158" cy="67" r="5" fill="#4CAF50"/>
  <text x="170" y="71" font-family="sans-serif" font-size="10" fill="#4CAF50" font-weight="bold">LIVE</text>
  
  <!-- Large value display -->
  <rect x="20" y="90" width="320" height="100" rx="16" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="130" font-family="sans-serif" font-size="11" fill="#006494" text-anchor="middle" font-weight="bold">X</text>
  <text x="90" y="170" font-family="sans-serif" font-size="28" fill="#333" text-anchor="middle" font-weight="bold">9.812</text>
  <text x="90" y="185" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">m/s²</text>
  <line x1="170" y1="100" x2="170" y2="180" stroke="#ddd" stroke-width="1"/>
  <text x="195" y="130" font-family="sans-serif" font-size="11" fill="#006494" text-anchor="middle" font-weight="bold">Y</text>
  <text x="195" y="170" font-family="sans-serif" font-size="28" fill="#333" text-anchor="middle" font-weight="bold">0.012</text>
  <text x="195" y="185" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">m/s²</text>
  <line x1="280" y1="100" x2="280" y2="180" stroke="#ddd" stroke-width="1"/>
  <text x="305" y="130" font-family="sans-serif" font-size="11" fill="#006494" text-anchor="middle" font-weight="bold">Z</text>
  <text x="305" y="170" font-family="sans-serif" font-size="28" fill="#333" text-anchor="middle" font-weight="bold">0.034</text>
  <text x="305" y="185" font-family="sans-serif" font-size="10" fill="#888" text-anchor="middle">m/s²</text>
  
  <!-- Live line chart -->
  <rect x="20" y="205" width="320" height="200" rx="16" fill="white" stroke="#eee" stroke-width="1"/>
  <!-- Chart area -->
  <rect x="40" y="220" width="280" height="165" rx="4" fill="#f8f9fa"/>
  <!-- Grid lines -->
  <line x1="40" y1="260" x2="320" y2="260" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="40" y1="300" x2="320" y2="300" stroke="#e0e0e0" stroke-width="0.5"/>
  <line x1="40" y1="340" x2="320" y2="340" stroke="#e0e0e0" stroke-width="0.5"/>
  <!-- Sine wave data line -->
  <polyline points="50,380 60,370 70,355 80,340 90,320 100,300 110,280 120,265 130,258 140,260 150,270 160,285 170,300 180,318 190,335 200,348 210,355 220,358 230,352 240,340 250,325 260,310 270,295 280,285 290,280 300,282 310,290 315,300"
    fill="none" stroke="#006494" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Y-axis label -->
  <text x="30" y="380" font-family="sans-serif" font-size="8" fill="#999" text-anchor="end">9.81</text>
  <text x="30" y="340" font-family="sans-serif" font-size="8" fill="#999" text-anchor="end">9.82</text>
  <text x="30" y="300" font-family="sans-serif" font-size="8" fill="#999" text-anchor="end">9.81</text>
  <text x="30" y="260" font-family="sans-serif" font-size="8" fill="#999" text-anchor="end">9.80</text>
  <text x="30" y="225" font-family="sans-serif" font-size="8" fill="#999" text-anchor="end">9.79</text>
  
  <!-- Buttons -->
  <rect x="20" y="420" width="155" height="44" rx="22" fill="#006494"/>
  <text x="52" y="447" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">⏸ Pause Logging</text>
  <rect x="185" y="420" width="155" height="44" rx="22" fill="#006494"/>
  <text x="218" y="447" font-family="sans-serif" font-size="12" fill="white" font-weight="bold">⬇ Export CSV</text>
  
  <!-- Axis values at bottom -->
  <text x="180" y="480" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">X: 9.812 m/s²  Y: 0.012 m/s²  Z: 0.034 m/s²</text>
</svg>
